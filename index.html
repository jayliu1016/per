<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liangcheng's Quant Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        .quant-font { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .factor-grid div { transition: all 0.3s ease; cursor: pointer; }
        .factor-grid div:hover { transform: scale(1.1); filter: brightness(1.5); }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full glass-panel rounded-3xl p-8 shadow-2xl shadow-blue-500/10">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-blue-400 font-mono text-sm tracking-widest uppercase mb-1">Soochow Securities | Quant Project</h2>
                <h1 class="text-3xl font-bold">高频因子与行业轮动模型</h1>
            </div>
            <div class="text-right">
                <p class="text-slate-500 text-xs uppercase tracking-tighter">Sharpe Ratio</p>
                <div id="sharpe-ratio" class="text-6xl font-black text-yellow-400 quant-font">0.0</div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <div>
                <p class="text-sm text-slate-400 mb-4 italic">点击因子查看行业暴露贡献度：</p>
                <div class="factor-grid grid grid-cols-5 gap-2" id="heatmap">
                    </div>
                <div class="flex gap-4 mt-6">
                    <button onclick="highlightFactor('momentum')" class="px-4 py-2 border border-blue-500/50 rounded-full text-xs hover:bg-blue-500/20 transition">动量因子 (Momentum)</button>
                    <button onclick="highlightFactor('value')" class="px-4 py-2 border border-purple-500/50 rounded-full text-xs hover:bg-purple-500/20 transition">价值因子 (Value)</button>
                </div>
            </div>

            <div class="relative h-48 bg-slate-900/50 rounded-xl border border-slate-800 overflow-hidden flex items-end">
                <svg viewBox="0 0 400 150" class="w-full h-full">
                    <path id="alpha-line" d="M0,150 Q50,140 100,100 T200,80 T300,40 T400,10" 
                          fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
                </svg>
                <div class="absolute top-4 left-4 bg-blue-500/20 px-3 py-1 rounded text-[10px] text-blue-300 font-bold uppercase">
                    Alpha Curve +18.4%
                </div>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-800 flex flex-wrap gap-3">
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">PCA</span>
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">ARIMA/GARCH</span>
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">Box-Cox Transformation</span>
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">Information Coefficient (IC)</span>
        </div>
    </div>

    <script>
        // 1. 初始化热力图方块
        const heatmap = document.getElementById('heatmap');
        for (let i = 0; i < 25; i++) {
            const div = document.createElement('div');
            const opacity = Math.random() * 0.7 + 0.1;
            div.className = 'h-10 w-full rounded-sm';
            div.style.backgroundColor = `rgba(56, 189, 248, ${opacity})`;
            heatmap.appendChild(div);
        }

        // 2. 夏普比率数字跳动动画
        function animateNumbers() {
            const sharpeText = document.getElementById('sharpe-ratio');
            let data = { val: 0 };
            
            gsap.to(data, {
                val: 1.8, // 对应简历中的夏普比率 
                duration: 2.5,
                ease: "power3.out",
                onUpdate: () => {
                    sharpeText.innerText = data.val.toFixed(1);
                }
            });
        }

        // 3. 因子高亮交互
        function highlightFactor(type) {
            const blocks = document.querySelectorAll('#heatmap div');
            const color = type === 'momentum' ? '#38bdf8' : '#a855f7';
            
            gsap.to(blocks, {
                backgroundColor: (i) => Math.random() > 0.5 ? color : 'rgba(30, 41, 59, 0.5)',
                scale: (i) => Math.random() > 0.5 ? 1.2 : 0.8,
                duration: 0.6,
                stagger: 0.02,
                ease: "back.out"
            });
        }

        // 4. Alpha 曲线路径动画
        gsap.from("#alpha-line", {
            drawSVG: "0%", // 注意：这通常需要 GSAP DrawSVG 插件，此处用 stroke-dash 模拟
            strokeDasharray: 1000,
            strokeDashoffset: 1000,
            duration: 3,
            ease: "power2.inOut"
        });
        gsap.to("#alpha-line", { strokeDashoffset: 0, duration: 3 });

        // 页面加载后启动
        window.onload = animateNumbers;
    </script>
</body>
</html>
